<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank App · Login & Register</title>
    <!-- Google Auto Ads -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9663432339191359"
         crossorigin="anonymous"></script>
    <script>
         (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0b2b44 0%, #123b56 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .bank-card {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            border-radius: 2.5rem;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.3) inset;
            width: 100%;
            max-width: 480px;
            padding: 2rem 1.8rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: float-in 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }
        @keyframes float-in {
            0% { opacity: 0; transform: translateY(30px) scale(0.96); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .screen {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        h2 {
            font-weight: 600;
            font-size: 1.9rem;
            color: #0b2b44;
            margin-bottom: 0.25rem;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        .input-group label {
            font-weight: 500;
            font-size: 0.9rem;
            color: #1e4c6f;
            margin-left: 0.5rem;
        }
        .input-wrapper {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 2rem;
            padding: 0.2rem 1.2rem;
            border: 1.5px solid #cbdbe9;
            transition: all 0.2s;
            box-shadow: 0 4px 8px rgba(0,20,40,0.03);
        }
        .input-wrapper:focus-within {
            border-color: #0077be;
            box-shadow: 0 8px 18px rgba(0,119,190,0.12);
            transform: scale(1.01);
        }
        .input-wrapper i {
            color: #2a6d9c;
            font-size: 1.1rem;
            margin-right: 0.6rem;
            width: 1.2rem;
        }
        .input-wrapper input {
            width: 100%;
            border: none;
            padding: 0.9rem 0;
            font-size: 1rem;
            background: transparent;
            outline: none;
            font-weight: 500;
        }
        .input-wrapper input::placeholder {
            color: #9fb3cc;
            font-weight: 400;
        }
        button {
            background: #0b2b44;
            border: none;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            padding: 1rem 1.8rem;
            border-radius: 3rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 16px rgba(0,35,70,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        button:hover {
            background: #124b70;
            transform: scale(1.02) translateY(-2px);
            box-shadow: 0 16px 24px rgba(0,55,100,0.25);
        }
        button:active {
            transform: scale(0.98);
        }
        button.secondary {
            background: white;
            color: #0b2b44;
            border: 1.5px solid #cbdbe9;
            box-shadow: none;
        }
        button.secondary:hover {
            background: #e6f0f9;
            border-color: #7fa9c7;
        }
        .link-toggle {
            text-align: center;
            margin-top: 0.5rem;
            font-size: 0.95rem;
        }
        .link-toggle span {
            color: #0d3757;
            font-weight: 600;
            cursor: pointer;
            padding: 0.4rem 0.8rem;
            border-radius: 2rem;
            transition: background 0.2s;
        }
        .link-toggle span:hover {
            background: rgba(0,70,120,0.08);
            text-decoration: underline;
        }
        .otp-section {
            background: #e9f2fa;
            padding: 1.2rem 1rem;
            border-radius: 2rem;
            margin: 0.5rem 0;
            animation: slide-down 0.3s ease;
        }
        @keyframes slide-down {
            0% { opacity: 0; transform: translateY(-10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .small-hint {
            color: #1f5a83;
            font-size: 0.8rem;
            margin-top: 0.2rem;
            background: #d4e6f5;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            display: inline-block;
        }
        .error-message {
            background: #ffdede;
            color: #a12b2b;
            padding: 0.7rem 1.2rem;
            border-radius: 3rem;
            font-size: 0.9rem;
            font-weight: 500;
            border-left: 5px solid #c73c3c;
            animation: shake 0.2s ease;
        }
        @keyframes shake {
            0%,100%{ transform: translateX(0); }
            25%{ transform: translateX(-6px); }
            75%{ transform: translateX(6px); }
        }
        .hidden { display: none !important; }
        i.fa-solid, i.fa-regular { pointer-events: none; }
    </style>
</head>
<body>
    <div class="bank-card" id="app"></div>

    <script>
        (function() {
            // ==================== CONFIG ====================
            const API_URL = 'https://bank-backend-two-dun.vercel.app/api/auth';

            // ==================== STATE ====================
            let state = {
                screen: 'login',
                email: '',
                password: '',
                confirmPassword: '',
                otpValue: '',
                error: '',
                isLoading: false
            };

            // Redirect if already logged in
            const token = localStorage.getItem('token');
            if (token) {
                window.location.href = 'dashboard.html';
            }

            // ==================== RENDER ====================
            const appDiv = document.getElementById('app');

            function renderScreen() {
                appDiv.style.opacity = '0.7';
                appDiv.style.transform = 'scale(0.99)';
                setTimeout(() => {
                    appDiv.innerHTML = getScreenHTML(state.screen);
                    appDiv.style.transition = 'opacity 0.2s ease, transform 0.2s ease';
                    appDiv.style.opacity = '1';
                    appDiv.style.transform = 'scale(1)';
                    attachListeners();
                }, 70);
            }

            function getScreenHTML(screen) {
                switch(screen) {
                    case 'login': return renderLogin();
                    case 'register': return renderRegister();
                    case 'otp': return renderOtp();
                    default: return renderLogin();
                }
            }

            function renderLogin() {
                return `
                    <div class="screen">
                        <h2><i class="fa-solid fa-building-columns"></i> Welcome Back</h2>
                        ${state.error ? `<div class="error-message">${state.error}</div>` : ''}
                        <div class="input-group">
                            <label>📧 Email Address</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-envelope"></i>
                                <input type="email" id="login-email" placeholder="name@example.com" value="${state.email}">
                            </div>
                        </div>
                        <div class="input-group">
                            <label>🔒 Password</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-lock"></i>
                                <input type="password" id="login-password" placeholder="••••••••" value="${state.password}">
                            </div>
                        </div>
                        <button id="login-btn" ${state.isLoading ? 'disabled' : ''}>
                            ${state.isLoading ? '<i class="fa-solid fa-spinner fa-spin"></i> Logging in...' : '<i class="fa-solid fa-arrow-right-to-bracket"></i> Log In'}
                        </button>
                        <div class="link-toggle">
                            <span id="goto-register">📝 New user? Create account</span>
                        </div>
                    </div>
                `;
            }

            function renderRegister() {
                return `
                    <div class="screen">
                        <h2><i class="fa-regular fa-id-card"></i> Open Account</h2>
                        ${state.error ? `<div class="error-message">${state.error}</div>` : ''}
                        <div class="input-group">
                            <label>📧 Email Address</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-envelope"></i>
                                <input type="email" id="reg-email" placeholder="name@example.com" value="${state.email}">
                            </div>
                        </div>
                        <div class="input-group">
                            <label>🔑 Password (min 4 chars)</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-key"></i>
                                <input type="password" id="reg-password" placeholder="••••••••" value="${state.password}">
                            </div>
                        </div>
                        <div class="input-group">
                            <label>✓ Confirm Password</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-circle-check"></i>
                                <input type="password" id="reg-confirm" placeholder="re-enter" value="${state.confirmPassword}">
                            </div>
                        </div>
                        <button id="send-otp-btn" ${state.isLoading ? 'disabled' : ''}>
                            ${state.isLoading ? '<i class="fa-solid fa-spinner fa-spin"></i> Sending...' : '<i class="fa-solid fa-paper-plane"></i> Send OTP'}
                        </button>
                        <div class="link-toggle">
                            <span id="goto-login">↩️ Already have account? Login</span>
                        </div>
                    </div>
                `;
            }

            function renderOtp() {
                return `
                    <div class="screen">
                        <h2><i class="fa-solid fa-shield-halved"></i> Verify Email</h2>
                        <div class="otp-section">
                            <div style="display:flex; gap:0.8rem; align-items:center; margin-bottom:0.8rem;">
                                <i class="fa-solid fa-envelope-open-text" style="font-size:1.8rem; color:#0b2b44;"></i>
                                <div style="flex:1">
                                    <div style="font-weight:500;">OTP sent to</div>
                                    <div style="font-weight:700; word-break: break-all;">${state.email}</div>
                                    <div class="small-hint">Check your inbox (valid 10 min)</div>
                                </div>
                            </div>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-lock-open"></i>
                                <input type="text" id="otp-input" placeholder="6-digit code" maxlength="6" value="${state.otpValue}">
                            </div>
                        </div>
                        ${state.error ? `<div class="error-message">${state.error}</div>` : ''}
                        <button id="verify-otp-btn" ${state.isLoading ? 'disabled' : ''}>
                            ${state.isLoading ? '<i class="fa-solid fa-spinner fa-spin"></i> Verifying...' : '<i class="fa-solid fa-check-circle"></i> Verify & Register'}
                        </button>
                        <button class="secondary" id="resend-otp-btn" ${state.isLoading ? 'disabled' : ''}>
                            <i class="fa-solid fa-rotate-right"></i> Resend OTP
                        </button>
                        <div class="link-toggle">
                            <span id="back-to-register">← Back to registration</span>
                        </div>
                    </div>
                `;
            }

            // ==================== API CALLS ====================
            async function handleSendOtp() {
                const email = state.email.trim().toLowerCase();
                const pwd = state.password;
                const confirm = state.confirmPassword;

                if (!email || !pwd || !confirm) {
                    state.error = 'All fields are required';
                    renderScreen(); 
                    return;
                }
                if (pwd.length < 4) {
                    state.error = 'Password must be at least 4 characters';
                    renderScreen(); 
                    return;
                }
                if (pwd !== confirm) {
                    state.error = 'Passwords do not match';
                    renderScreen(); 
                    return;
                }
                if (!email.includes('@') || !email.includes('.')) {
                    state.error = 'Please enter a valid email address';
                    renderScreen(); 
                    return;
                }

                state.isLoading = true;
                state.error = '';
                renderScreen();

                try {
                    const res = await fetch(`${API_URL}/send-otp`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password: pwd })
                    });
                    const data = await res.json();
                    if (!res.ok) {
                        throw new Error(data.error || 'Failed to send OTP');
                    }
                    state.screen = 'otp';
                    state.error = '';
                    state.isLoading = false;
                    renderScreen();
                } catch (err) {
                    state.error = err.message || 'Network error. Please try again.';
                    state.isLoading = false;
                    renderScreen();
                }
            }

            async function handleVerifyOtp() {
                const otp = state.otpValue;
                if (!otp || otp.length !== 6) {
                    state.error = 'Please enter 6-digit OTP code';
                    renderScreen(); 
                    return;
                }

                state.isLoading = true;
                state.error = '';
                renderScreen();

                try {
                    const res = await fetch(`${API_URL}/verify-otp`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            email: state.email,
                            otp: otp,
                            password: state.password
                        })
                    });
                    const data = await res.json();
                    if (!res.ok) {
                        throw new Error(data.error || 'Verification failed');
                    }
                    localStorage.setItem('token', data.token);
                    window.location.href = 'dashboard.html';
                } catch (err) {
                    state.error = err.message || 'Verification failed. Please try again.';
                    state.isLoading = false;
                    renderScreen();
                }
            }

            async function handleResendOtp() {
                state.isLoading = true;
                state.error = '';
                renderScreen();

                try {
                    const res = await fetch(`${API_URL}/send-otp`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            email: state.email, 
                            password: state.password 
                        })
                    });
                    const data = await res.json();
                    if (!res.ok) {
                        throw new Error(data.error || 'Failed to resend OTP');
                    }
                    state.error = '';
                    state.isLoading = false;
                    renderScreen();
                } catch (err) {
                    state.error = err.message || 'Failed to resend OTP';
                    state.isLoading = false;
                    renderScreen();
                }
            }

            async function handleLogin() {
                const email = state.email.trim().toLowerCase();
                const pwd = state.password;

                if (!email || !pwd) {
                    state.error = 'Please enter email and password';
                    renderScreen(); 
                    return;
                }

                state.isLoading = true;
                state.error = '';
                renderScreen();

                try {
                    const res = await fetch(`${API_URL}/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password: pwd })
                    });
                    const data = await res.json();
                    if (!res.ok) {
                        throw new Error(data.error || 'Invalid credentials');
                    }
                    localStorage.setItem('token', data.token);
                    window.location.href = 'dashboard.html';
                } catch (err) {
                    state.error = err.message || 'Login failed. Please try again.';
                    state.isLoading = false;
                    renderScreen();
                }
            }

            // ==================== LISTENERS ====================
            function attachListeners() {
                if (state.screen === 'login') {
                    document.getElementById('login-email')?.addEventListener('input', e => state.email = e.target.value);
                    document.getElementById('login-password')?.addEventListener('input', e => state.password = e.target.value);
                    document.getElementById('login-btn')?.addEventListener('click', handleLogin);
                    document.getElementById('goto-register')?.addEventListener('click', () => {
                        state.error = '';
                        state.screen = 'register';
                        renderScreen();
                    });
                }
                else if (state.screen === 'register') {
                    document.getElementById('reg-email')?.addEventListener('input', e => state.email = e.target.value);
                    document.getElementById('reg-password')?.addEventListener('input', e => state.password = e.target.value);
                    document.getElementById('reg-confirm')?.addEventListener('input', e => state.confirmPassword = e.target.value);
                    document.getElementById('send-otp-btn')?.addEventListener('click', handleSendOtp);
                    document.getElementById('goto-login')?.addEventListener('click', () => {
                        state.error = '';
                        state.screen = 'login';
                        renderScreen();
                    });
                }
                else if (state.screen === 'otp') {
                    document.getElementById('otp-input')?.addEventListener('input', e => state.otpValue = e.target.value);
                    document.getElementById('verify-otp-btn')?.addEventListener('click', handleVerifyOtp);
                    document.getElementById('resend-otp-btn')?.addEventListener('click', handleResendOtp);
                    document.getElementById('back-to-register')?.addEventListener('click', () => {
                        state.error = '';
                        state.screen = 'register';
                        renderScreen();
                    });
                }
            }

            // ==================== INIT ====================
            renderScreen();
        })();
    </script>
</body>
</html>
